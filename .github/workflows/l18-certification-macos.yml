name: L18 Certification (macOS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Certification profile
        type: choice
        required: true
        default: daily
        options:
          - daily
          - nightly
          - certify
      gui_app_path:
        description: Absolute GUI app path on runner (optional, fallback to env)
        required: false
        type: string
  schedule:
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  l18-certification:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 11000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve profile
        id: profile
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "value=nightly" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve GUI app path
        id: gui
        shell: bash
        run: |
          GUI_INPUT="${{ inputs.gui_app_path }}"
          if [[ -n "$GUI_INPUT" ]]; then
            echo "value=$GUI_INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "${L18_GUI_APP:-}" ]]; then
            echo "value=${L18_GUI_APP}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "value=" >> "$GITHUB_OUTPUT"

      - name: Build Rust parity runtime (fixed baseline)
        shell: bash
        run: |
          cargo build --release -p app --features parity --bin run

      - name: Run L18 capstone
        shell: bash
        env:
          L18_GUI_APP: ${{ steps.gui.outputs.value }}
          L18_REQUIRE_DOCKER: "1"
          L18_GUI_TIMEOUT_SEC: "120"
          L18_RUST_BUILD_ENABLED: "0"
          L18_RUST_BIN: ${{ github.workspace }}/target/release/run
          L18_GUI_GO_BUILD_ENABLED: "0"
          L18_GUI_RUST_BUILD_ENABLED: "0"
          INTEROP_GO_API_BASE: ${{ vars.INTEROP_GO_API_BASE }}
          INTEROP_GO_API_TOKEN: ${{ secrets.INTEROP_GO_API_TOKEN }}
        run: |
          PROFILE="${{ steps.profile.outputs.value }}"
          CMD=(scripts/l18/l18_capstone.sh --profile "$PROFILE")
          if [[ -n "${L18_GUI_APP}" ]]; then
            CMD+=(--gui-app "$L18_GUI_APP")
          fi
          if [[ -n "${INTEROP_GO_API_BASE:-}" ]]; then
            CMD+=(--go-api "$INTEROP_GO_API_BASE")
          fi
          if [[ -n "${INTEROP_GO_API_TOKEN:-}" ]]; then
            CMD+=(--go-token "$INTEROP_GO_API_TOKEN")
          fi

          printf 'Running command: %q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Upload L18 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l18-reports-${{ github.run_id }}
          path: |
            reports/l18/**
            reports/L18_REPLACEMENT_CERTIFICATION.md
            reports/l18/l18_capstone_status.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload interop-lab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l18-interop-artifacts-${{ github.run_id }}
          path: labs/interop-lab/artifacts/**
          if-no-files-found: warn
          retention-days: 30
