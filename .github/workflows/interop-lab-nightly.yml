name: Interop Lab Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version-file: go_fork_source/sing-box-1.12.14/go.mod

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-interop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-interop-

      - name: Build app
        run: cargo build -p app --features acceptance,clash_api --bin app

      - name: Build interop-lab
        run: cargo build -p interop-lab

      - name: Run interop-lab unit tests
        run: cargo test -p interop-lab

      - name: Run all strict cases
        run: |
          cargo run -p interop-lab -- case run \
            --kernel rust \
            --env-class strict

      - name: Run env_limited cases
        continue-on-error: true
        run: |
          cargo run -p interop-lab -- case run \
            --kernel rust \
            --env-class env_limited

      - name: Trend gate - P0 strict
        run: |
          ITERATIONS=2 KERNEL=rust RUN_PRIORITY=p0 RUN_ENV_CLASS=strict \
            THRESHOLD_CONFIG=labs/interop-lab/configs/trend_thresholds.yaml \
            THRESHOLD_TEMPLATE=strict \
            bash labs/interop-lab/scripts/run_case_trend_gate.sh ALL

      - name: Trend gate - P1 strict
        run: |
          ITERATIONS=2 KERNEL=rust RUN_PRIORITY=p1 RUN_ENV_CLASS=strict \
            THRESHOLD_CONFIG=labs/interop-lab/configs/trend_thresholds.yaml \
            THRESHOLD_TEMPLATE=strict \
            bash labs/interop-lab/scripts/run_case_trend_gate.sh ALL

      - name: Trend gate - env_limited
        continue-on-error: true
        run: |
          ITERATIONS=2 KERNEL=rust RUN_ENV_CLASS=env_limited \
            THRESHOLD_CONFIG=labs/interop-lab/configs/trend_thresholds.yaml \
            THRESHOLD_TEMPLATE=env_limited \
            bash labs/interop-lab/scripts/run_case_trend_gate.sh ALL

      - name: Trend gate - P2 dual-core strict
        run: |
          ITERATIONS=1 KERNEL=both RUN_ENV_CLASS=strict MANAGE_GO_ORACLE=1 \
            THRESHOLD_CONFIG=labs/interop-lab/configs/trend_thresholds.yaml \
            THRESHOLD_TEMPLATE=strict \
            bash labs/interop-lab/scripts/run_case_trend_gate.sh p2_connections_ws_soak_dual_core

      - name: Aggregate trend report with history
        if: always()
        run: |
          ITERATIONS=2 KERNEL=rust \
            ARTIFACTS_DIR=labs/interop-lab/artifacts \
            bash labs/interop-lab/scripts/aggregate_trend_report.sh ALL

      - name: Aggregate trend report - P2 dual-core strict
        if: always()
        run: |
          ITERATIONS=1 KERNEL=both RUN_ENV_CLASS=strict MANAGE_GO_ORACLE=1 \
            ARTIFACTS_DIR=labs/interop-lab/artifacts/dual_core_trend \
            bash labs/interop-lab/scripts/aggregate_trend_report.sh p2_connections_ws_soak_dual_core

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-lab-nightly-${{ github.run_id }}
          path: labs/interop-lab/artifacts/
          retention-days: 30
