name: interop-lab-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  full-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build interop-lab
        run: cargo build -p interop-lab

      - name: Run local harness smoke
        run: cargo run -p interop-lab -- case run --priority p0 --env-class strict

      - name: Run strict matrix
        run: |
          cargo run -p interop-lab -- case run --env-class strict

      - name: Run env-limited matrix
        run: |
          cargo run -p interop-lab -- case run --env-class env-limited || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interop-lab-artifacts
          path: labs/interop-lab/artifacts
          if-no-files-found: warn
