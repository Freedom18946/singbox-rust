name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os_name: linux-gnu
            arch: x86_64
            archive: tar.gz
            bin_name: run
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os_name: linux-musl
            arch: x86_64
            archive: tar.gz
            bin_name: run
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            os_name: linux-musl
            arch: aarch64
            archive: tar.gz
            bin_name: run
          - target: x86_64-apple-darwin
            runner: macos-latest
            os_name: macos
            arch: x86_64
            archive: tar.gz
            bin_name: run
          - target: aarch64-apple-darwin
            runner: macos-latest
            os_name: macos
            arch: aarch64
            archive: tar.gz
            bin_name: run
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os_name: windows
            arch: x86_64
            archive: zip
            bin_name: run.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux musl)
        if: matrix.target == 'aarch64-unknown-linux-musl' || matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p app --features parity --bin run

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package_release.sh
          version="${GITHUB_REF#refs/tags/}"
          out_dir="dist/${{ matrix.target }}"
          scripts/package_release.sh \
            --version "$version" \
            --target "${{ matrix.target }}" \
            --os "${{ matrix.os_name }}" \
            --arch "${{ matrix.arch }}" \
            --binary "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" \
            --out-dir "$out_dir" \
            --archive "${{ matrix.archive }}" \
            --config-template "deployments/config-template.json" \
            --readme "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name "checksums.txt" -exec cat {} \; | sort -u > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-*/*
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
