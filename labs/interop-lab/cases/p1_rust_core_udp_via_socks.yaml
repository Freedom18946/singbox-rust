id: p1_rust_core_udp_via_socks
title: core udp roundtrip via socks inbound
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    env:
      SB_SOCKS_UDP_ENABLE: "1"
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_dataplane.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_udp
    kind: udp_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: udp_round_trip
    name: via_socks_udp_echo
    addr: "{{upstream.local_udp}}"
    payload: hello-udp-via-socks
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.via_socks_udp_echo.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
