id: p1_rust_core_dns_via_socks
title: rust core dns query via socks udp associate
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - dataplane
bootstrap:
  rust:
    command: ./target/debug/app
    env:
      SB_SOCKS_UDP_ENABLE: "1"
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_dns
    kind: dns_stub
    bind: 127.0.0.1:0
traffic_plan:
  - kind: dns_query
    name: via_socks_dns_stub
    addr: "{{upstream.local_dns}}"
    qname: example.com.
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.via_socks_dns_stub.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
