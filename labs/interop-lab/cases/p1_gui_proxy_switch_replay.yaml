id: p1_gui_proxy_switch_replay
title: gui proxy selector switch replay
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - control-plane
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_selector.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
gui_sequence:
  - kind: http
    name: get_proxies_before
    method: GET
    path: /proxies
    expect_status: 200
  - kind: http
    name: switch_proxy
    method: PUT
    path: /proxies/my-group
    body:
      name: alt-direct
    expect_status: 204
  - kind: http
    name: get_proxies_after
    method: GET
    path: /proxies
    expect_status: 200
assertions:
  - key: errors.count
    op: eq
    expected: 0
  - key: http.get_proxies_before.status
    op: eq
    expected: 200
  - key: http.switch_proxy.status
    op: eq
    expected: 204
  - key: http.get_proxies_after.status
    op: eq
    expected: 200
oracle:
  tolerate_counter_jitter: true
