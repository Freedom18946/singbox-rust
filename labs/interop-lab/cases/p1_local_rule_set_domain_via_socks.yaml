id: p1_local_rule_set_domain_via_socks
title: local source rule set routes matching domain on both kernels
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - routing
  - rule-set
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_local_rule_set_domain.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_local_rule_set_domain.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:18897
traffic_plan:
  - kind: tcp_round_trip
    name: rule_set_match_direct
    addr: "localhost:18897"
    payload: rule-set-direct
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: rule_set_miss_blocked
    addr: "nope.invalid:18897"
    payload: should-be-blocked
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.rule_set_match_direct.success
    op: eq
    expected: true
  - key: traffic.rule_set_miss_blocked.success
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
