id: p1_dns_cache_ttl_via_socks
title: dataplane dns cache holds within ttl and refreshes after expiry on both kernels
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - dns
  - dual_core
owner: L9
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_dns_cache.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_dns_cache.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:38081
  - name: local_dns
    kind: dns_stub
    bind: 127.0.0.1:38554
    answer_ipv4: 127.0.0.1
    ttl_secs: 1
traffic_plan:
  - kind: http_get
    name: first_http_via_socks5h
    url: http://cache-hit.test:38081/v1/echo?attempt=1
    proxy: socks5h://127.0.0.1:11821
    expect_status: 200
  - kind: upstream_query_count
    name: dns_queries_after_first
    target: local_dns
  - kind: http_get
    name: second_http_via_socks5h
    url: http://cache-hit.test:38081/v1/echo?attempt=2
    proxy: socks5h://127.0.0.1:11821
    expect_status: 200
  - kind: upstream_query_count
    name: dns_queries_after_second
    target: local_dns
  - kind: sleep
    name: wait_for_dns_ttl
    ms: 2500
  - kind: http_get
    name: third_http_via_socks5h
    url: http://cache-hit.test:38081/v1/echo?attempt=3
    proxy: socks5h://127.0.0.1:11821
    expect_status: 200
  - kind: upstream_query_count
    name: dns_queries_after_ttl
    target: local_dns
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.first_http_via_socks5h.success
    op: eq
    expected: true
  - key: traffic.second_http_via_socks5h.success
    op: eq
    expected: true
  - key: traffic.third_http_via_socks5h.success
    op: eq
    expected: true
  - key: traffic.dns_queries_after_first.detail.count
    op: gt
    expected: 0
  - key: traffic.dns_queries_after_second.detail.count
    op: eq_ref
    expected: traffic.dns_queries_after_first.detail.count
  - key: traffic.dns_queries_after_ttl.detail.count
    op: ne_ref
    expected: traffic.dns_queries_after_second.detail.count
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
