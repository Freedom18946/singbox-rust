id: p1_deprecated_mixed_config
title: mixed config flags only deprecated fields not new-style fields
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - deprecation
  - mixed
  - migration
owner: L12
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_deprecated_mixed.json
      - run
      - --admin-listen
      - "127.0.0.1:19303"
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: "http://127.0.0.1:19303"
gui_sequence: []
upstream_topology: []
traffic_plan: []
assertions:
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
