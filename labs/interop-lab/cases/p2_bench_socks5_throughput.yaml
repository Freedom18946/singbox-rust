id: p2_bench_socks5_throughput
title: dual-kernel SOCKS5 end-to-end throughput floor
priority: p2
kernel_mode: both
env_class: strict
tags:
  - benchmark
  - throughput
  - socks5
  - dual_core
owner: S5-T4
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_dataplane.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence: []
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: tcp_throughput
    name: socks5_live_throughput
    addr: "{{upstream.local_tcp}}"
    proxy: socks5://127.0.0.1:11801
    payload_size: 1048576
    warmup: 1
    samples: 5
    timeout_ms: 10000
    min_mib_per_sec: 10.0
assertions:
  - key: traffic.socks5_live_throughput.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
