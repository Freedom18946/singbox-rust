id: p1_network_rule_via_socks
title: network rule routes tcp to direct and blocks udp before final
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - routing
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_network_rule.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_network_rule.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:0
  - name: local_udp
    kind: udp_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: tcp_round_trip
    name: tcp_match_direct
    addr: "{{upstream.local_tcp}}"
    payload: network-tcp-direct
    proxy: socks5://127.0.0.1:11801
  - kind: udp_round_trip
    name: udp_miss_blocked
    addr: "{{upstream.local_udp}}"
    payload: network-udp-blocked
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.tcp_match_direct.success
    op: eq
    expected: true
  - key: traffic.udp_miss_blocked.success
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
