id: p1_fault_disconnect_ws_upstream
title: fault disconnect upstream ws while rust core remains healthy
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - dataplane
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_ws
    kind: ws_echo
    bind: 127.0.0.1:0
faults:
  - kind: disconnect
    target: local_ws
traffic_plan:
  - kind: ws_round_trip
    name: disconnected_ws_should_fail
    url: "{{upstream.local_ws}}"
    payload: hello-ws-fault-disconnect
    proxy: socks5://127.0.0.1:11801
    timeout_ms: 5000
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.disconnected_ws_should_fail.success
    op: eq
    expected: false
oracle:
  tolerate_counter_jitter: true
