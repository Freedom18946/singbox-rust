id: p1_auth_negative_missing_token
title: auth negative contract with missing bearer token
priority: p1
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: ${INTEROP_GO_BINARY}
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: get_configs_missing_token
    method: GET
    path: /configs
    no_auth: true
  - kind: ws_collect
    name: logs_missing_token
    path: /logs
    no_auth: true
    max_frames: 1
    duration_ms: 1500
assertions:
  - key: errors.count
    op: eq
    expected: 1
  - key: errors.0.stage
    op: eq
    expected: ws:logs_missing_token
  - key: errors.0.message
    op: contains
    expected: "401"
  - key: http.get_configs_missing_token.status
    op: gte
    expected: 400
  - key: http.get_configs_missing_token.status
    op: lt
    expected: 500
