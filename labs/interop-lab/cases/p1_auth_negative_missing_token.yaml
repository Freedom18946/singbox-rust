id: p1_auth_negative_missing_token
title: auth negative contract with missing bearer token
priority: p1
kernel_mode: both
env_class: env_limited
tags:
  - control-plane
bootstrap:
  rust:
    startup_timeout_ms: 30000
    ready_path: /version
    api:
      base_url: ${INTEROP_RUST_API_BASE}
  go:
    startup_timeout_ms: 30000
    ready_path: /version
    api:
      base_url: ${INTEROP_GO_API_BASE}
gui_sequence:
  - kind: http
    name: get_configs_missing_token
    method: GET
    path: /configs
  - kind: ws_collect
    name: logs_missing_token
    path: /logs
    max_frames: 1
    duration_ms: 1500
assertions:
  - key: http.get_configs_missing_token.status
    op: gte
    expected: 400
  - key: http.get_configs_missing_token.status
    op: lt
    expected: 500
