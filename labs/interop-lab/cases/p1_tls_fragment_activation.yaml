id: p1_tls_fragment_activation
title: tls fragment activation from route options starts without errors
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - tls
  - fragment
  - activation
owner: L14
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_tls_fragment.json
      - run
      - --admin-listen
      - "127.0.0.1:19308"
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: "http://127.0.0.1:19308"
gui_sequence: []
upstream_topology: []
traffic_plan: []
assertions:
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
