id: p1_rust_core_http_via_socks
title: core egress via socks inbound to local upstream
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_dataplane.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: http_get
    name: via_socks_http_echo
    url: "{{upstream.local_http}}/v1/echo?scene=rust-core"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
  - kind: http_get_latency
    name: via_socks_http_echo_p95
    url: "{{upstream.local_http}}/v1/echo?scene=rust-core-latency"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
    warmup: 3
    samples: 20
    timeout_ms: 3000
    max_p95_ms: 500
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.via_socks_http_echo.success
    op: eq
    expected: true
  - key: traffic.via_socks_http_echo_p95.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
