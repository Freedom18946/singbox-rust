id: p1_fault_disconnect_tls_upstream
title: fault disconnect upstream tls while rust core remains healthy
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - dataplane
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_tls
    kind: tls_echo
    bind: 127.0.0.1:0
faults:
  - kind: disconnect
    target: local_tls
traffic_plan:
  - kind: tls_round_trip
    name: disconnected_tls_should_fail
    addr: "{{upstream.local_tls}}"
    payload: hello-tls-fault-disconnect
    proxy: socks5://127.0.0.1:11801
    skip_verify: true
    timeout_ms: 5000
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.disconnected_tls_should_fail.success
    op: eq
    expected: false
oracle:
  tolerate_counter_jitter: true
