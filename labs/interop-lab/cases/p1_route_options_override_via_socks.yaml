id: p1_route_options_override_via_socks
title: route-options rewrites destination before later route match
priority: p1
kernel_mode: both
env_class: strict
tags: [dataplane, routing, route-options, destination-override, dual_core]
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api_route_options_override.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api_route_options_override.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - { name: override_target_tcp, kind: tcp_echo, bind: "127.0.0.1:18898" }
  - { name: final_direct_control_tcp, kind: tcp_echo, bind: "127.0.0.1:18899" }
traffic_plan:
  - kind: tcp_round_trip
    name: address_and_port_override
    addr: "192.0.2.1:18897"
    payload: route-options-override
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: final_direct_control
    addr: "127.0.0.1:18899"
    payload: final-direct-control
    proxy: socks5://127.0.0.1:11801
assertions:
  - { key: http.version.status, op: eq, expected: 200 }
  - { key: traffic.address_and_port_override.success, op: eq, expected: true }
  - { key: traffic.final_direct_control.success, op: eq, expected: true }
  - { key: errors.count, op: eq, expected: 0 }
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths: [/version]
