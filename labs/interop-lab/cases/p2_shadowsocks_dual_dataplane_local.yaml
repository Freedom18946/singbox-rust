id: p2_shadowsocks_dual_dataplane_local
title: shadowsocks dual-kernel local dataplane parity
priority: p2
kernel_mode: both
env_class: strict
tags:
  - protocol
  - dataplane
  - dual_core
  - shadowsocks
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/protocol_shadowsocks_rust.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19191
      secret: test-secret
  go:
    command: ${INTEROP_GO_BINARY}
    args:
      - run
      - -c
      - labs/interop-lab/configs/protocol_shadowsocks_go.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
upstream_topology:
  - name: ss_server
    kind: shadowsocks_inbound
    bind: 127.0.0.1:12082
  - name: local_tcp_ok
    kind: tcp_echo
    bind: 127.0.0.1:18091
  - name: local_tcp_bad
    kind: tcp_echo
    bind: 127.0.0.1:18092
  - name: local_udp_ok
    kind: udp_echo
    bind: 127.0.0.1:19091
  - name: local_udp_bad
    kind: udp_echo
    bind: 127.0.0.1:19092
traffic_plan:
  - kind: tcp_round_trip
    name: ss_tcp_ok
    addr: "{{upstream.local_tcp_ok}}"
    payload: shadowsocks-tcp-ok
    proxy: socks5://127.0.0.1:11801
  - kind: udp_round_trip
    name: ss_udp_ok
    addr: "{{upstream.local_udp_ok}}"
    payload: shadowsocks-udp-ok
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: ss_tcp_wrong_password
    addr: "{{upstream.local_tcp_bad}}"
    payload: shadowsocks-tcp-bad
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: traffic.ss_tcp_ok.success
    op: eq
    expected: true
  - key: traffic.ss_udp_ok.success
    op: eq
    expected: true
  - key: traffic.ss_tcp_wrong_password.success
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  counter_jitter_abs: 64
