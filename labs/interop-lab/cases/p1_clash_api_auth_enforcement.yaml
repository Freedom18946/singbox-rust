id: p1_clash_api_auth_enforcement
title: clash api authentication enforcement with secret configured
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - auth
  - clash-api
  - security
owner: L13
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_auth.json
      - run
      - --admin-listen
      - "127.0.0.1:19304"
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: "http://127.0.0.1:19290"
gui_sequence:
  - kind: http
    name: no_auth_should_reject
    method: GET
    path: /
    expect_status: 401
  - kind: http
    name: correct_bearer_should_pass
    method: GET
    path: /
    expect_status: 200
  - kind: http
    name: wrong_bearer_should_reject
    method: GET
    path: /
    expect_status: 401
upstream_topology: []
traffic_plan: []
assertions:
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
