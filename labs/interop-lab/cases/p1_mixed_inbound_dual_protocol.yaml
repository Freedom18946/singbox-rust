id: p1_mixed_inbound_dual_protocol
title: mixed inbound detects socks5 and http connect on same port
priority: p1
kernel_mode: both
env_class: strict
tags:
  - dataplane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_mixed.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_mixed.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:0
traffic_plan:
  # SOCKS5 through mixed port - tests byte 0x05 detection
  - kind: tcp_round_trip
    name: via_mixed_socks5
    addr: "{{upstream.local_tcp}}"
    payload: mixed-socks5-detect
    proxy: socks5://127.0.0.1:11801
  # HTTP CONNECT through mixed port - tests non-SOCKS byte detection
  - kind: tcp_round_trip
    name: via_mixed_http_connect
    addr: "{{upstream.local_tcp}}"
    payload: mixed-http-connect-detect
    proxy: http://127.0.0.1:11801
assertions:
  - key: http.version.status
    op: eq
    expected: 200
  - key: traffic.via_mixed_socks5.success
    op: eq
    expected: true
  - key: traffic.via_mixed_http_connect.success
    op: eq
    expected: true
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
