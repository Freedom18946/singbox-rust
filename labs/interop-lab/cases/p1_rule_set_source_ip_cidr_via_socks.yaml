id: p1_rule_set_source_ip_cidr_via_socks
title: rule set IP CIDR source mode ignores matching destination IP
priority: p1
kernel_mode: both
env_class: strict
tags: [dataplane, routing, rule-set, source-ip, dual_core]
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api_rule_set_source_ip_cidr.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api_rule_set_source_ip_cidr.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:18897
  - name: ipv6_source_control_tcp
    kind: tcp_echo
    bind: 127.0.0.1:18898
traffic_plan:
  - kind: tcp_round_trip
    name: source_rule_set_match_direct
    addr: "127.0.0.1:18897"
    payload: source-rule-set-direct
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: ipv6_source_control_direct
    addr: "127.0.0.1:18898"
    payload: ipv6-source-control-direct
    proxy: socks5://[::1]:11802
  - kind: tcp_round_trip
    name: destination_only_rule_set_miss_blocked
    addr: "127.0.0.1:18897"
    payload: should-be-blocked
    proxy: socks5://[::1]:11802
assertions:
  - { key: http.version.status, op: eq, expected: 200 }
  - { key: traffic.source_rule_set_match_direct.success, op: eq, expected: true }
  - { key: traffic.ipv6_source_control_direct.success, op: eq, expected: true }
  - { key: traffic.destination_only_rule_set_miss_blocked.success, op: eq, expected: false }
  - { key: errors.count, op: eq, expected: 0 }
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths: [/version]
