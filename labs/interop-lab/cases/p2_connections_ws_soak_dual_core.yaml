id: p2_connections_ws_soak_dual_core
title: clash connections websocket soak — dual-core (Rust + Go passive)
priority: p2
kernel_mode: both
env_class: strict
tags:
  - ws
  - dual_core
  - soak
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api.json
    ready_path: /configs
    startup_timeout_ms: 15000
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: api_ws_soak
    name: connections_ws_long_running_soak
    path: /connections
    clients_per_wave: 24
    waves: 20
    wave_delay_ms: 120
    wave_success_percent: 95
    overall_success_percent: 97
post_traffic_gui_sequence:
  - kind: sleep
    ms: 1000
  - kind: ws_collect
    name: post_soak_memory
    path: /memory
    max_frames: 8
    duration_ms: 5000
assertions:
  - key: traffic.connections_ws_long_running_soak.success
    op: eq
    expected: true
  - key: memory.count
    op: gte
    expected: 3
  - key: memory.leak_detected
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  counter_jitter_abs: 50
  ignore_ws_paths:
    - /memory
