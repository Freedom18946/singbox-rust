id: p2_protocol_unit_shadowsocks
title: shadowsocks protocol unit tests via cargo test
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - protocol
  - unit_test
bootstrap:
  rust:
    ready_path: /v1/echo
    api:
      base_url: "{{upstream.local_http}}"
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: ss_protocol_validation
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - shadowsocks_protocol_validation
      - --features
      - net_e2e
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
assertions:
  - key: traffic.ss_protocol_validation.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
