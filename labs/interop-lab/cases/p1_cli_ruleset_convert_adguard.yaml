id: p1_cli_ruleset_convert_adguard
title: rule-set convert --type adguard converts AdGuard filter to JSON with domain_suffix
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - cli
  - ruleset
  - adguard
owner: L15
bootstrap:
  rust:
    startup_timeout_ms: 5000
    ready_path: /
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence: []
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: run_cli
    command: ./target/debug/app
    args:
      - rule-set
      - convert
      - --type
      - adguard
      - labs/interop-lab/configs/test_adguard_filter.txt
    timeout_ms: 30000
    expect_exit: 0
assertions:
  - key: traffic.run_cli.detail.exit_code
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
