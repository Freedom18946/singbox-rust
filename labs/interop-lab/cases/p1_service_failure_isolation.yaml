id: p1_service_failure_isolation
title: broken service does not prevent core kernel startup
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - service
  - fault-isolation
  - resilience
owner: L13
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_broken_service.json
      - run
      - --admin-listen
      - "127.0.0.1:19305"
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: "http://127.0.0.1:19291"
gui_sequence:
  - kind: http
    name: clash_api_should_be_reachable
    method: GET
    path: /
    expect_status: 200
upstream_topology: []
traffic_plan: []
assertions:
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
