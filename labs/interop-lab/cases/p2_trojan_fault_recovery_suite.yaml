id: p2_trojan_fault_recovery_suite
title: trojan fault then recovery semantics via targeted net_e2e tests
priority: p2
kernel_mode: rust
bootstrap:
  rust:
    ready_path: /v1/echo
    api:
      base_url: "{{upstream.local_http}}"
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: trojan_fault_wrong_password
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - trojan_binary_protocol_test
      - --features
      - net_e2e,tls_reality
      - test_binary_protocol_wrong_password
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
  - kind: command
    name: trojan_recovery_correct_password
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - trojan_binary_protocol_test
      - --features
      - net_e2e,tls_reality
      - test_binary_protocol_correct_password
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
assertions:
  - key: traffic.trojan_fault_wrong_password.success
    op: eq
    expected: true
  - key: traffic.trojan_recovery_correct_password.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
