id: p2_connections_ws_concurrency_suite
title: clash connections websocket high concurrency stability
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - ws
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
traffic_plan:
  - kind: api_ws_soak
    name: connections_ws_high_concurrency
    path: /connections
    clients_per_wave: 32
    waves: 1
    wave_delay_ms: 0
    wave_success_percent: 95
    overall_success_percent: 95
assertions:
  - key: traffic.connections_ws_high_concurrency.success
    op: eq
    expected: true
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
