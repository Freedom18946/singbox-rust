id: p0_clash_api_contract
title: clash api and ws contract replay
priority: p0
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: ${INTEROP_GO_BINARY}
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: get_configs
    method: GET
    path: /configs
    expect_status: 200
  - kind: http
    name: patch_configs_mode
    method: PATCH
    path: /configs
    body:
      mode: rule
    expect_status: 204
  - kind: http
    name: get_proxies
    method: GET
    path: /proxies
    expect_status: 200
  - kind: http
    name: get_proxy_delay
    method: GET
    path: /proxies/DIRECT/delay?timeout=1000
  - kind: http
    name: get_connections
    method: GET
    path: /connections
    expect_status: 200
  - kind: http
    name: close_connection_probe
    method: DELETE
    path: /connections/non-existent-connection-id
  - kind: ws_collect
    name: memory_stream
    path: /memory
    max_frames: 2
    duration_ms: 3000
  - kind: ws_collect
    name: traffic_stream
    path: /traffic
    max_frames: 2
    duration_ms: 3000
  - kind: ws_collect
    name: connections_stream
    path: /connections
    max_frames: 2
    duration_ms: 3000
  - kind: ws_collect
    name: logs_stream
    path: /logs
    max_frames: 2
    duration_ms: 3000
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /configs
    - /proxies
    - /connections
    - /proxies/DIRECT/delay*
  ignore_ws_paths:
    - /memory
    - /traffic
    - /connections
    - /logs
