id: p2_subscription_empty_input
title: subscription parser graceful error on empty input
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - subscription
  - error_handling
bootstrap:
  rust:
    ready_path: /
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence:
  - kind: subscription_parse
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
subscription_input:
  type: inline
  content: ""
assertions:
  - key: errors.count
    op: gte
    expected: 1
