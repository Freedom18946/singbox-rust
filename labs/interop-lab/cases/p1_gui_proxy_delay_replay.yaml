id: p1_gui_proxy_delay_replay
title: gui proxy delay test replay
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - control-plane
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_selector.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:18899
gui_sequence:
  - kind: http
    name: get_proxy_delay
    method: GET
    path: "/proxies/DIRECT/delay?url=http%3A%2F%2F127.0.0.1%3A18899%2F&timeout=5000"
    expect_status: 200
assertions:
  - key: errors.count
    op: eq
    expected: 0
  - key: http.get_proxy_delay.status
    op: eq
    expected: 200
oracle:
  tolerate_counter_jitter: true
