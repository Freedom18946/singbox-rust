id: p1_recovery_disconnect_reconnect_http_via_socks
title: recovery flow disconnect then reconnect upstream http via rust socks
priority: p1
kernel_mode: rust
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: http_get
    name: before_disconnect_should_succeed
    url: "{{upstream.local_http}}/v1/echo?scene=recovery-before"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
  - kind: fault_disconnect
    name: disconnect_local_http
    target: local_http
  - kind: http_get
    name: during_disconnect_should_fail
    url: "{{upstream.local_http}}/v1/echo?scene=recovery-during"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
  - kind: fault_reconnect
    name: reconnect_local_http
    target: local_http
  - kind: sleep
    name: wait_after_reconnect
    ms: 200
  - kind: http_get
    name: after_reconnect_should_recover
    url: "{{upstream.local_http}}/v1/echo?scene=recovery-after"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.before_disconnect_should_succeed.success
    op: eq
    expected: true
  - key: traffic.during_disconnect_should_fail.success
    op: eq
    expected: false
  - key: traffic.after_reconnect_should_recover.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
