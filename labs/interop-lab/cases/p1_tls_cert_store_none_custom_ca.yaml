id: p1_tls_cert_store_none_custom_ca
title: none certificate store mode requires custom CAs for TLS validation
priority: p1
kernel_mode: rust
env_class: env_limited
tags:
  - tls
  - certificate
  - custom-ca
owner: L14
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_tls_none.json
      - run
      - --admin-listen
      - "127.0.0.1:19307"
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: "http://127.0.0.1:19307"
gui_sequence: []
upstream_topology: []
traffic_plan: []
assertions:
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
