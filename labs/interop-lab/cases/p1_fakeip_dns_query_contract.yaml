id: p1_fakeip_dns_query_contract
title: fakeip dns query allocates fake address on both kernels
priority: p1
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dataplane
  - dual_core
  - dns
  - fakeip
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api_fakeip.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api_fakeip.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
traffic_plan:
  - kind: api_http
    name: fakeip_dns_query
    method: GET
    path: /dns/query?name=fakeip.example&type=A
    expect_status: 200
assertions:
  - key: traffic.fakeip_dns_query.success
    op: eq
    expected: true
  - key: traffic.fakeip_dns_query.detail.answer_ips.0
    op: regex
    expected: "^198\\.(18|19)\\."
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /dns/query*
