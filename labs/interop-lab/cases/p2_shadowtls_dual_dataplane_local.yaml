id: p2_shadowtls_dual_dataplane_local
title: shadowtls dual-kernel wrapper-chain parity probe
priority: p2
kernel_mode: both
env_class: strict
tags:
  - protocol
  - dataplane
  - dual_core
  - shadowtls
  - wrapper_chain
  - detour
bootstrap:
  rust:
    command: cargo
    args:
      - run
      - -p
      - app
      - --features
      - adapters,clash_api
      - --
      - -c
      - labs/interop-lab/configs/protocol_shadowtls_rust.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 240000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19191
      secret: test-secret
  go:
    command: ${INTEROP_GO_BINARY}
    args:
      - run
      - -c
      - labs/interop-lab/configs/protocol_shadowtls_go.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
upstream_topology:
  - name: shadowsocks_server
    kind: shadowsocks_inbound
    bind: 127.0.0.1:12082
  - name: shadowtls_handshake
    kind: tls_echo
    bind: 127.0.0.1:12084
  - name: shadowtls_server
    kind: tls_relay_tcp
    bind: 127.0.0.1:12083
    target: 127.0.0.1:12082
    handshake_target: 127.0.0.1:12084
  - name: local_tcp_ok
    kind: tcp_echo
    bind: 127.0.0.1:18101
  - name: local_tcp_strict
    kind: tcp_echo
    bind: 127.0.0.1:18102
traffic_plan:
  - kind: tcp_round_trip
    name: stl_tcp_ok
    addr: "{{upstream.local_tcp_ok}}"
    payload: shadowtls-dual-ok
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: stl_tcp_strict_cert
    addr: "{{upstream.local_tcp_strict}}"
    payload: shadowtls-dual-strict
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: traffic.stl_tcp_ok.success
    op: eq
    expected: true
  - key: traffic.stl_tcp_strict_cert.success
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  counter_jitter_abs: 64
