id: p1_gui_ws_reconnect_behavior
title: gui ws reconnect behavior after kernel restart
priority: p1
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: ws_parallel
    name: pre_restart_ws
    streams:
      - path: /traffic
        max_frames: 2
      - path: /connections
        max_frames: 2
    duration_ms: 2000
traffic_plan:
  - kind: api_ws_expect_close_on_kernel_control
    name: restart_rust_connections_ws
    path: /connections
    action: restart
    target: rust
    frame_timeout_ms: 3000
    close_timeout_ms: 5000
    wait_ready_ms: 15000
  - kind: api_ws_expect_close_on_kernel_control
    name: restart_go_connections_ws
    path: /connections
    action: restart
    target: go
    frame_timeout_ms: 3000
    close_timeout_ms: 5000
    wait_ready_ms: 15000
post_traffic_gui_sequence:
  - kind: sleep
    ms: 1000
  - kind: ws_parallel
    name: post_restart_ws
    streams:
      - path: /traffic
        max_frames: 2
      - path: /connections
        max_frames: 2
    duration_ms: 2000
assertions:
  - key: errors.count
    op: eq
    expected: 0
  - key: traffic.restart_rust_connections_ws.success
    op: eq
    expected: true
  - key: traffic.restart_rust_connections_ws.detail.close_observed
    op: eq
    expected: true
  - key: traffic.restart_go_connections_ws.success
    op: eq
    expected: true
  - key: traffic.restart_go_connections_ws.detail.close_observed
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
  ignore_ws_paths:
    - /traffic
    - /connections
