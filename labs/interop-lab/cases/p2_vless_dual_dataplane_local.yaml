id: p2_vless_dual_dataplane_local
title: vless dual-kernel local dataplane parity
priority: p2
kernel_mode: both
env_class: strict
tags:
  - protocol
  - dataplane
  - dual_core
  - vless
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/protocol_vless_rust.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19191
      secret: test-secret
  go:
    command: ${INTEROP_GO_BINARY}
    args:
      - run
      - -c
      - labs/interop-lab/configs/protocol_vless_go.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
upstream_topology:
  - name: vless_server
    kind: vless_inbound
    bind: 127.0.0.1:12083
  - name: local_tcp_ok
    kind: tcp_echo
    bind: 127.0.0.1:18101
  - name: local_tcp_bad
    kind: tcp_echo
    bind: 127.0.0.1:18102
traffic_plan:
  - kind: tcp_round_trip
    name: vless_tcp_ok
    addr: "{{upstream.local_tcp_ok}}"
    payload: vless-dual-ok
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: vless_tcp_wrong_uuid
    addr: "{{upstream.local_tcp_bad}}"
    payload: vless-dual-bad
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: traffic.vless_tcp_ok.success
    op: eq
    expected: true
  - key: traffic.vless_tcp_wrong_uuid.success
    op: eq
    expected: false
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  counter_jitter_abs: 64
