id: l6_local_harness_smoke
title: local harness self-check
priority: p0
kernel_mode: both
env_class: strict
tags:
  - dataplane
bootstrap:
  rust:
    ready_path: /
    startup_timeout_ms: 5000
    api:
      base_url: "{{upstream.local_http}}"
  go:
    ready_path: /
    startup_timeout_ms: 5000
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence:
  - kind: http
    name: ping_root
    method: GET
    path: /
    expect_status: 200
  - kind: subscription_parse
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:0
  - name: local_udp
    kind: udp_echo
    bind: 127.0.0.1:0
  - name: local_dns
    kind: dns_stub
    bind: 127.0.0.1:0
traffic_plan:
  - kind: http_get
    name: http_echo
    url: "{{upstream.local_http}}/v1/echo"
    expect_status: 200
  - kind: tcp_round_trip
    name: tcp_echo
    addr: "{{upstream.local_tcp}}"
    payload: hello-interoperability
  - kind: udp_round_trip
    name: udp_echo
    addr: "{{upstream.local_udp}}"
    payload: hello-udp
  - kind: dns_query
    name: dns_stub
    addr: "{{upstream.local_dns}}"
    qname: example.com.
subscription_input:
  type: inline
  content: |
    {"outbounds":[{"type":"vmess","tag":"vmess-node"},{"type":"trojan","tag":"trojan-node"}]}
oracle:
  tolerate_counter_jitter: true
