id: p1_subscription_file_urls
title: subscription parser from maintained file urls
priority: p1
kernel_mode: rust
env_class: env_limited
tags:
  - subscription
bootstrap:
  rust:
    ready_path: /ping
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence:
  - kind: subscription_parse
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
subscription_input:
  type: file
  path: labs/interop-lab/subscriptions/subscription_urls.txt
