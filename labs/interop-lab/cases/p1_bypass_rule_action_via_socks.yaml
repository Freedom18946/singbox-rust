id: p1_bypass_rule_action_via_socks
title: empty bypass action continues to later reject rule
priority: p1
kernel_mode: both
env_class: strict
tags: [dataplane, routing, bypass-action, dual_core]
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api_bypass_rule_action.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api_bypass_rule_action.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - { name: bypass_then_reject_tcp, kind: tcp_echo, bind: "127.0.0.1:18897" }
  - { name: direct_control_tcp, kind: tcp_echo, bind: "127.0.0.1:18898" }
traffic_plan:
  - kind: tcp_round_trip
    name: bypass_direct_control
    addr: "127.0.0.1:18898"
    payload: bypass-control
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: empty_bypass_continues_to_reject
    addr: "127.0.0.1:18897"
    payload: should-be-rejected
    proxy: socks5://127.0.0.1:11801
assertions:
  - { key: http.version.status, op: eq, expected: 200 }
  - { key: traffic.bypass_direct_control.success, op: eq, expected: true }
  - { key: traffic.empty_bypass_continues_to_reject.success, op: eq, expected: false }
  - { key: errors.count, op: eq, expected: 0 }
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths: [/version]
