id: p1_ip_version_rule_via_socks
title: destination IP version routes IPv4 before final block
priority: p1
kernel_mode: both
env_class: strict
tags: [dataplane, routing, ip-version, dual_core]
bootstrap:
  rust:
    command: ./target/debug/app
    args: [-c, labs/interop-lab/configs/rust_core_clash_api_ip_version_rule.json, run]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.13.13/sing-box
    args: [run, -c, labs/interop-lab/configs/go_core_clash_api_ip_version_rule.json]
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
  - kind: http
    name: version
    method: GET
    path: /version
    expect_status: 200
upstream_topology:
  - name: ipv4_tcp
    kind: tcp_echo
    bind: 127.0.0.1:18897
  - name: ipv6_tcp
    kind: tcp_echo
    bind: "[::1]:18898"
  - name: ipv6_control_tcp
    kind: tcp_echo
    bind: "[::1]:18899"
traffic_plan:
  - kind: tcp_round_trip
    name: ipv4_match_direct
    addr: "127.0.0.1:18897"
    payload: ipv4-direct
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: ipv6_control_direct
    addr: "[::1]:18899"
    payload: ipv6-control-direct
    proxy: socks5://127.0.0.1:11801
  - kind: tcp_round_trip
    name: ipv6_miss_blocked
    addr: "[::1]:18898"
    payload: should-be-blocked
    proxy: socks5://127.0.0.1:11801
assertions:
  - { key: http.version.status, op: eq, expected: 200 }
  - { key: traffic.ipv4_match_direct.success, op: eq, expected: true }
  - { key: traffic.ipv6_control_direct.success, op: eq, expected: true }
  - { key: traffic.ipv6_miss_blocked.success, op: eq, expected: false }
  - { key: errors.count, op: eq, expected: 0 }
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths: [/version]
