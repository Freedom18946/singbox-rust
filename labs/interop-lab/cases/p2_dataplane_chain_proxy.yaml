id: p2_dataplane_chain_proxy
title: chain proxy dual-hop via SOCKS5 → SOCKS5 → direct
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - dataplane
  - chain_proxy
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_chain_proxy.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: http_get
    name: chain_proxy_http_echo
    url: "{{upstream.local_http}}/echo"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.chain_proxy_http_echo.success
    op: eq
    expected: true
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
