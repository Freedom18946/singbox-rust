id: p2_bench_shadowsocks_throughput
title: Shadowsocks throughput benchmark integration
priority: p2
kernel_mode: rust
env_class: env_limited
tags:
  - benchmark
  - throughput
  - shadowsocks
owner: L16
bootstrap:
  rust:
    startup_timeout_ms: 5000
    ready_path: /
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence: []
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: shadowsocks_bench
    command: cargo
    args:
      - bench
      - -p
      - sb-benches
      - --bench
      - shadowsocks_throughput
      - --
      - --noplot
      - --sample-size
      - "20"
      - --measurement-time
      - "5"
    timeout_ms: 600000
    expect_exit: 0
assertions: []
oracle:
  tolerate_counter_jitter: true
