id: p2_subscription_truncated_base64
title: subscription parser graceful error on truncated base64
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - subscription
  - error_handling
bootstrap:
  rust:
    ready_path: /
    api:
      base_url: "{{upstream.local_http}}"
gui_sequence:
  - kind: subscription_parse
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
subscription_input:
  type: inline
  content: "Y2x1c3Rlci4=GARBAGE_NOT_BASE64!!!"
assertions:
  - key: errors.count
    op: eq
    expected: 1
  - key: errors.0.stage
    op: eq
    expected: subscription_parse
  - key: errors.0.message
    op: contains
    expected: unsupported subscription format
