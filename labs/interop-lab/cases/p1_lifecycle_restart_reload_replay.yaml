id: p1_lifecycle_restart_reload_replay
title: lifecycle restart and reload replay on both kernels
priority: p1
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence: []
upstream_topology: []
traffic_plan:
  - kind: api_http
    name: version_before_restart
    method: GET
    path: /version
    expect_status: 200
  - kind: kernel_control
    name: restart_rust_kernel
    action: restart
    target: rust
    wait_ready_ms: 15000
  - kind: kernel_control
    name: restart_go_kernel
    action: restart
    target: go
    wait_ready_ms: 15000
  - kind: api_http
    name: version_after_restart
    method: GET
    path: /version
    expect_status: 200
  - kind: kernel_control
    name: reload_rust_kernel
    action: reload
    target: rust
    wait_ready_ms: 15000
  - kind: kernel_control
    name: reload_go_kernel
    action: reload
    target: go
    wait_ready_ms: 15000
  - kind: api_http
    name: version_after_reload
    method: GET
    path: /version
    expect_status: 200
  - kind: kernel_control
    name: shutdown_rust_kernel
    action: shutdown
    target: rust
    wait_ready_ms: 6000
  - kind: kernel_control
    name: restart_rust_after_shutdown
    action: restart
    target: rust
    wait_ready_ms: 15000
  - kind: kernel_control
    name: shutdown_go_kernel
    action: shutdown
    target: go
    wait_ready_ms: 6000
  - kind: kernel_control
    name: restart_go_after_shutdown
    action: restart
    target: go
    wait_ready_ms: 15000
  - kind: api_http
    name: version_after_shutdown_restart
    method: GET
    path: /version
    expect_status: 200
assertions:
  - key: traffic.version_before_restart.success
    op: eq
    expected: true
  - key: traffic.restart_rust_kernel.success
    op: eq
    expected: true
  - key: traffic.restart_go_kernel.success
    op: eq
    expected: true
  - key: traffic.version_after_restart.success
    op: eq
    expected: true
  - key: traffic.reload_rust_kernel.success
    op: eq
    expected: true
  - key: traffic.reload_go_kernel.success
    op: eq
    expected: true
  - key: traffic.version_after_reload.success
    op: eq
    expected: true
  - key: traffic.shutdown_rust_kernel.success
    op: eq
    expected: true
  - key: traffic.restart_rust_after_shutdown.success
    op: eq
    expected: true
  - key: traffic.shutdown_go_kernel.success
    op: eq
    expected: true
  - key: traffic.restart_go_after_shutdown.success
    op: eq
    expected: true
  - key: traffic.version_after_shutdown_restart.success
    op: eq
    expected: true
  - key: http.version_before_restart.status
    op: eq
    expected: 200
  - key: http.version_after_restart.status
    op: eq
    expected: 200
  - key: http.version_after_reload.status
    op: eq
    expected: 200
  - key: http.version_after_shutdown_restart.status
    op: eq
    expected: 200
  - key: errors.count
    op: eq
    expected: 0
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /version
