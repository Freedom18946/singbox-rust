id: p2_trojan_network_restart_suite
title: trojan restart and multi-flap with concurrent burst recovery via real net_e2e tests
priority: p2
kernel_mode: rust
bootstrap:
  rust:
    ready_path: /v1/echo
    api:
      base_url: "{{upstream.local_http}}"
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: trojan_network_restart_recovery
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - trojan_network_fault_recovery
      - --features
      - net_e2e,tls_reality
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
assertions:
  - key: traffic.trojan_network_restart_recovery.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
