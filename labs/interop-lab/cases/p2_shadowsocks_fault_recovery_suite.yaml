id: p2_shadowsocks_fault_recovery_suite
title: shadowsocks fault then recovery semantics via targeted net_e2e tests
priority: p2
kernel_mode: rust
env_class: strict
tags:
  - protocol
bootstrap:
  rust:
    ready_path: /v1/echo
    api:
      base_url: "{{upstream.local_http}}"
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: command
    name: shadowsocks_fault_wrong_password
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - shadowsocks_protocol_validation
      - --features
      - net_e2e
      - test_ss_wrong_password
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
  - kind: command
    name: shadowsocks_recovery_aes256
    command: cargo
    args:
      - test
      - -p
      - app
      - --test
      - shadowsocks_protocol_validation
      - --features
      - net_e2e
      - test_ss_aes256gcm_encryption
      - --
      - --nocapture
    timeout_ms: 600000
    expect_exit: 0
assertions:
  - key: traffic.shadowsocks_fault_wrong_password.success
    op: eq
    expected: true
  - key: traffic.shadowsocks_recovery_aes256.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
