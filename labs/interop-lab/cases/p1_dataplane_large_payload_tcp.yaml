id: p1_dataplane_large_payload_tcp
title: large TCP payload roundtrip (128KB) via SOCKS5
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - dataplane
  - large_payload
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_tcp
    kind: tcp_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: tcp_round_trip
    name: large_tcp_128kb
    addr: "{{upstream.local_tcp}}"
    payload: ""
    payload_size: 131072
    proxy: socks5://127.0.0.1:11801
assertions:
  - key: http.healthz.status
    op: eq
    expected: 200
  - key: traffic.large_tcp_128kb.success
    op: eq
    expected: true
oracle:
  tolerate_counter_jitter: true
