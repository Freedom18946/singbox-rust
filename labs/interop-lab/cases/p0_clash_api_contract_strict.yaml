id: p0_clash_api_contract_strict
title: strict mode clash api contract replay with managed kernels
priority: p0
kernel_mode: both
env_class: strict
tags:
  - control-plane
  - dual_core
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_clash_api.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
      - run
      - -c
      - labs/interop-lab/configs/go_core_clash_api.json
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:18899
gui_sequence:
  - kind: ws_parallel
    name: boot_ws
    streams:
      - path: /memory
        max_frames: 2
      - path: /traffic
        max_frames: 2
      - path: /connections
        max_frames: 2
      - path: /logs
        max_frames: 2
    duration_ms: 3000
  - kind: http
    name: get_configs
    method: GET
    path: /configs
    expect_status: 200
  - kind: http
    name: patch_configs_mode
    method: PATCH
    path: /configs
    body:
      mode: rule
    expect_status: 204
  - kind: http
    name: get_proxies
    method: GET
    path: /proxies
    expect_status: 200
  - kind: http
    name: get_proxy_delay
    method: GET
    path: /proxies/direct/delay?url=http%3A%2F%2F127.0.0.1%3A18899%2F&timeout=5000
  - kind: http
    name: get_connections
    method: GET
    path: /connections
    expect_status: 200
  - kind: http
    name: close_connection_probe
    method: DELETE
    path: /connections/non-existent-connection-id
assertions:
  - key: errors.count
    op: eq
    expected: 0
  - key: http.get_configs.status
    op: eq
    expected: 200
  - key: http.get_proxies.status
    op: eq
    expected: 200
  - key: http.get_connections.status
    op: eq
    expected: 200
oracle:
  tolerate_counter_jitter: true
  ignore_http_paths:
    - /configs
    - /proxies
    - /connections
    - /proxies/direct/delay*
  ignore_ws_paths:
    - /memory
    - /traffic
    - /connections
    - /logs
