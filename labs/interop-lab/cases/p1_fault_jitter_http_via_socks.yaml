id: p1_fault_jitter_http_via_socks
title: fault jitter on upstream http to validate timeout observability
priority: p1
kernel_mode: rust
env_class: strict
tags:
  - dataplane
bootstrap:
  rust:
    command: ./target/debug/app
    args:
      - -c
      - labs/interop-lab/configs/rust_core_socks_http.json
      - run
      - --admin-listen
      - 127.0.0.1:19190
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
gui_sequence:
  - kind: http
    name: healthz
    method: GET
    path: /healthz
    expect_status: 200
upstream_topology:
  - name: local_http
    kind: http_echo
    bind: 127.0.0.1:0
traffic_plan:
  - kind: fault_jitter
    name: inject_jitter
    target: local_http
    base_ms: 12000
    jitter_ms: 2000
    ratio: 1.0
  - kind: http_get
    name: jitter_http_should_timeout
    url: "{{upstream.local_http}}/v1/echo?scene=fault-jitter"
    proxy: socks5://127.0.0.1:11801
    expect_status: 200
assertions:
  - key: traffic.inject_jitter.detail.applied_delay_ms
    op: gte
    expected: 12000
  - key: traffic.jitter_http_should_timeout.success
    op: eq
    expected: false
oracle:
  tolerate_counter_jitter: true
