id: p1_fault_disconnect_ws_upstream
title: fault disconnect upstream ws while rust core remains healthy
owner: null
priority: p1
kernel_mode: rust
tags:
- dataplane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_ws
  kind: ws_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: ws_round_trip
  name: disconnected_ws_should_fail
  url: '{{upstream.local_ws}}'
  payload: hello-ws-fault-disconnect
  proxy: socks5://127.0.0.1:11801
  timeout_ms: 5000
subscription_input: null
faults:
- kind: disconnect
  target: local_ws
assertions:
- key: http.healthz.status
  op: eq
  expected: 200
- key: traffic.disconnected_ws_should_fail.success
  op: eq
  expected: false
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
