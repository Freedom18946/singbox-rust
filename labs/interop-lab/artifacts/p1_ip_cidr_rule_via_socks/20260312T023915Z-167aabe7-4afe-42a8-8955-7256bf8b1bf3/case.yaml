id: p1_ip_cidr_rule_via_socks
title: ip cidr routing matches local addresses before final block
owner: null
priority: p1
kernel_mode: both
tags:
- dataplane
- routing
- dual_core
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api_ip_cidr.json
    - run
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
    - run
    - -c
    - labs/interop-lab/configs/go_core_clash_api_ip_cidr.json
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
- kind: http
  name: version
  method: GET
  path: /version
  body: null
  no_auth: false
  auth_secret: null
  expect_status: 200
upstream_topology:
- name: local_tcp
  kind: tcp_echo
  bind: 127.0.0.1:0
  target: null
  handshake_target: null
traffic_plan:
- kind: tcp_round_trip
  name: ip_cidr_match_direct
  addr: '{{upstream.local_tcp}}'
  payload: ip-cidr-direct
  proxy: socks5://127.0.0.1:11801
  payload_size: null
- kind: tcp_round_trip
  name: ip_cidr_miss_blocked
  addr: 198.18.1.10:9
  payload: should-be-blocked
  proxy: socks5://127.0.0.1:11801
  payload_size: null
subscription_input: null
faults: []
assertions:
- key: http.version.status
  op: eq
  expected: 200
- key: traffic.ip_cidr_match_direct.success
  op: eq
  expected: true
- key: traffic.ip_cidr_miss_blocked.success
  op: eq
  expected: false
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths:
  - /version
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
