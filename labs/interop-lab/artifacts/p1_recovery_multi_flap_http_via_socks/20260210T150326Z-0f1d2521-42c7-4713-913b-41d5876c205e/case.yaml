id: p1_recovery_multi_flap_http_via_socks
title: recovery flow with repeated upstream flaps via rust socks
priority: p1
kernel_mode: rust
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_http
  kind: http_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: http_get
  name: before_flap_should_succeed
  url: '{{upstream.local_http}}/v1/echo?scene=multi-flap-before'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_disconnect
  name: disconnect_1
  target: local_http
- kind: http_get
  name: during_disconnect_1_should_fail
  url: '{{upstream.local_http}}/v1/echo?scene=multi-flap-during-1'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_reconnect
  name: reconnect_1
  target: local_http
- kind: sleep
  name: wait_after_reconnect_1
  ms: 200
- kind: http_get
  name: after_reconnect_1_should_recover
  url: '{{upstream.local_http}}/v1/echo?scene=multi-flap-after-1'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_disconnect
  name: disconnect_2
  target: local_http
- kind: http_get
  name: during_disconnect_2_should_fail
  url: '{{upstream.local_http}}/v1/echo?scene=multi-flap-during-2'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_reconnect
  name: reconnect_2
  target: local_http
- kind: sleep
  name: wait_after_reconnect_2
  ms: 200
- kind: http_get
  name: after_reconnect_2_should_recover
  url: '{{upstream.local_http}}/v1/echo?scene=multi-flap-after-2'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
subscription_input: null
faults: []
assertions:
- key: http.healthz.status
  op: eq
  expected: 200
- key: traffic.before_flap_should_succeed.success
  op: eq
  expected: true
- key: traffic.during_disconnect_1_should_fail.success
  op: eq
  expected: false
- key: traffic.after_reconnect_1_should_recover.success
  op: eq
  expected: true
- key: traffic.during_disconnect_2_should_fail.success
  op: eq
  expected: false
- key: traffic.after_reconnect_2_should_recover.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
