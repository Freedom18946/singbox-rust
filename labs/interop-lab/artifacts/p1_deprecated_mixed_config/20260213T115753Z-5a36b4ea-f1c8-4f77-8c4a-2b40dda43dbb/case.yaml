id: p1_deprecated_mixed_config
title: mixed config flags only deprecated fields not new-style fields
owner: L12
priority: p1
kernel_mode: rust
tags:
- deprecation
- mixed
- migration
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_deprecated_mixed.json
    - run
    - --admin-listen
    - 127.0.0.1:19303
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19303
      secret: null
  go: null
gui_sequence: []
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
