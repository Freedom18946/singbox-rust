id: p1_tls_cert_store_mozilla
title: mozilla certificate store mode uses webpki root certificates
owner: L14
priority: p1
kernel_mode: rust
tags:
- tls
- certificate
- mozilla
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_tls_mozilla.json
    - run
    - --admin-listen
    - 127.0.0.1:19306
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19306
      secret: null
  go: null
gui_sequence: []
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
