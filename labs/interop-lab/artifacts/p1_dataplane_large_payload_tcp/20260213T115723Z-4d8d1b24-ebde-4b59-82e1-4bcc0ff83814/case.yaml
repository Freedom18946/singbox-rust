id: p1_dataplane_large_payload_tcp
title: large TCP payload roundtrip (128KB) via SOCKS5
owner: null
priority: p1
kernel_mode: rust
tags:
- dataplane
- large_payload
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_tcp
  kind: tcp_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: tcp_round_trip
  name: large_tcp_128kb
  addr: '{{upstream.local_tcp}}'
  payload: ''
  proxy: socks5://127.0.0.1:11801
  payload_size: 131072
subscription_input: null
faults: []
assertions:
- key: http.healthz.status
  op: eq
  expected: 200
- key: traffic.large_tcp_128kb.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
