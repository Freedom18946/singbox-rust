id: p1_dns_query_endpoint_contract
title: dns query endpoint resolves localhost on both kernels
owner: null
priority: p1
kernel_mode: both
tags:
- control-plane
- dual_core
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
    - run
    - -c
    - labs/interop-lab/configs/go_core_clash_api.json
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence:
- kind: http
  name: dns_query
  method: GET
  path: /dns/query?name=localhost&type=A
  body: null
  no_auth: false
  auth_secret: null
  expect_status: 200
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: http.dns_query.status
  op: eq
  expected: 200
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths:
  - /dns/query*
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
