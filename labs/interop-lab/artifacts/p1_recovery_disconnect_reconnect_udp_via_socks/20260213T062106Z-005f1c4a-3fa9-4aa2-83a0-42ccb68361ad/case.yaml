id: p1_recovery_disconnect_reconnect_udp_via_socks
title: recovery flow disconnect then reconnect upstream udp via rust socks
owner: null
priority: p1
kernel_mode: rust
tags:
- dataplane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env:
      SB_SOCKS_UDP_ENABLE: '1'
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_udp
  kind: udp_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: udp_round_trip
  name: before_disconnect_should_succeed
  addr: '{{upstream.local_udp}}'
  payload: hello-udp-recovery-before
  proxy: socks5://127.0.0.1:11801
  payload_size: null
- kind: fault_disconnect
  name: disconnect_local_udp
  target: local_udp
- kind: udp_round_trip
  name: during_disconnect_should_fail
  addr: '{{upstream.local_udp}}'
  payload: hello-udp-recovery-during
  proxy: socks5://127.0.0.1:11801
  payload_size: null
- kind: fault_reconnect
  name: reconnect_local_udp
  target: local_udp
- kind: sleep
  name: wait_after_reconnect
  ms: 200
- kind: udp_round_trip
  name: after_reconnect_should_recover
  addr: '{{upstream.local_udp}}'
  payload: hello-udp-recovery-after
  proxy: socks5://127.0.0.1:11801
  payload_size: null
subscription_input: null
faults: []
assertions:
- key: http.healthz.status
  op: eq
  expected: 200
- key: traffic.before_disconnect_should_succeed.success
  op: eq
  expected: true
- key: traffic.during_disconnect_should_fail.success
  op: eq
  expected: false
- key: traffic.after_reconnect_should_recover.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
