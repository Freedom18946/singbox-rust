id: p0_clash_api_contract_strict
title: strict mode clash api contract replay with managed kernel
owner: null
priority: p0
kernel_mode: rust
tags:
- control-plane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go: null
gui_sequence:
- kind: ws_parallel
  name: boot_ws
  streams:
  - path: /memory
    max_frames: 2
    params: null
  - path: /traffic
    max_frames: 2
    params: null
  - path: /connections
    max_frames: 2
    params: null
  - path: /logs
    max_frames: 2
    params: null
  duration_ms: 3000
- kind: http
  name: get_configs
  method: GET
  path: /configs
  body: null
  expect_status: 200
- kind: http
  name: patch_configs_mode
  method: PATCH
  path: /configs
  body:
    mode: rule
  expect_status: 204
- kind: http
  name: get_proxies
  method: GET
  path: /proxies
  body: null
  expect_status: 200
- kind: http
  name: get_proxy_delay
  method: GET
  path: /proxies/DIRECT/delay?timeout=1000
  body: null
  expect_status: null
- kind: http
  name: get_connections
  method: GET
  path: /connections
  body: null
  expect_status: 200
- kind: http
  name: close_connection_probe
  method: DELETE
  path: /connections/non-existent-connection-id
  body: null
  expect_status: null
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
- key: http.get_configs.status
  op: eq
  expected: 200
- key: http.get_proxies.status
  op: eq
  expected: 200
- key: http.get_connections.status
  op: eq
  expected: 200
oracle:
  ignore_http_paths: []
  ignore_ws_paths:
  - /memory
  - /traffic
  - /connections
  - /logs
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
