id: p1_rust_core_http_via_socks
title: rust core egress via socks inbound to local upstream
priority: p1
kernel_mode: rust
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_http
  kind: http_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: http_get
  name: via_socks_http_echo
  url: '{{upstream.local_http}}/v1/echo?scene=rust-core'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
subscription_input: null
faults: []
assertions:
- key: http.healthz.status
  op: eq
  expected: 200
- key: traffic.via_socks_http_echo.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
