id: p1_gui_connections_tracking
title: gui connections tracking assertion with chains and rule metadata
owner: null
priority: p1
kernel_mode: rust
tags:
- control-plane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api_selector.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /version
  body: null
  expect_status: 200
upstream_topology:
- name: local_http
  kind: http_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: http_get
  name: generate_traffic
  url: '{{upstream.local_http}}/v1/echo?scene=connection-tracking'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: sleep
  name: wait_for_connections
  ms: 500
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
- key: traffic.generate_traffic.success
  op: eq
  expected: true
- key: connections.count
  op: gt
  expected: 0
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence:
- kind: http
  name: get_connections
  method: GET
  path: /connections
  body: null
  expect_status: 200
