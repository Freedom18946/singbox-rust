id: p2_bench_shadowsocks_throughput
title: Shadowsocks throughput benchmark integration
owner: L16
priority: p2
kernel_mode: rust
tags:
- benchmark
- throughput
- shadowsocks
env_class: env_limited
bootstrap:
  rust:
    command: null
    args: []
    env: {}
    workdir: null
    startup_timeout_ms: 5000
    ready_path: /
    api:
      base_url: https://example.com
      secret: null
  go: null
gui_sequence: []
upstream_topology: []
traffic_plan:
- kind: command
  name: shadowsocks_bench
  command: cargo
  args:
  - bench
  - -p
  - sb-benches
  - --bench
  - shadowsocks_throughput
  - --
  - --noplot
  - --sample-size
  - '20'
  - --measurement-time
  - '5'
  env: {}
  workdir: null
  timeout_ms: 600000
  expect_exit: 0
subscription_input: null
faults: []
assertions: []
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
