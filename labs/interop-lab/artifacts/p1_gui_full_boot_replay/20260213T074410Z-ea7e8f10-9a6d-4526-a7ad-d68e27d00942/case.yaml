id: p1_gui_full_boot_replay
title: gui.for full boot sequence replay with 4 parallel ws streams
owner: null
priority: p1
kernel_mode: rust
tags:
- control-plane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go: null
gui_sequence:
- kind: ws_parallel
  name: boot_ws
  streams:
  - path: /memory
    max_frames: 2
    params: null
  - path: /traffic
    max_frames: 2
    params: null
  - path: /connections
    max_frames: 2
    params: null
  - path: /logs
    max_frames: 2
    params: null
  duration_ms: 3000
- kind: http
  name: get_configs
  method: GET
  path: /configs
  body: null
  expect_status: 200
- kind: http
  name: get_proxies
  method: GET
  path: /proxies
  body: null
  expect_status: 200
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
- key: http.get_configs.status
  op: eq
  expected: 200
- key: http.get_proxies.status
  op: eq
  expected: 200
oracle:
  ignore_http_paths: []
  ignore_ws_paths:
  - /memory
  - /traffic
  - /connections
  - /logs
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
