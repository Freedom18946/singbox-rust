id: p1_recovery_jitter_http_via_socks
title: recovery from jitter fault by clearing injected delay
owner: null
priority: p1
kernel_mode: rust
tags:
- dataplane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology:
- name: local_http
  kind: http_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: http_get
  name: before_jitter_should_succeed
  url: '{{upstream.local_http}}/v1/echo?scene=jitter-before'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_jitter
  name: inject_high_jitter
  target: local_http
  base_ms: 12000
  jitter_ms: 2000
  ratio: 1.0
- kind: http_get
  name: during_jitter_should_fail
  url: '{{upstream.local_http}}/v1/echo?scene=jitter-during'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
- kind: fault_jitter
  name: clear_jitter
  target: local_http
  base_ms: 0
  jitter_ms: 0
  ratio: 0.0
- kind: sleep
  name: wait_after_clear
  ms: 200
- kind: http_get
  name: after_clear_should_recover
  url: '{{upstream.local_http}}/v1/echo?scene=jitter-after'
  proxy: socks5://127.0.0.1:11801
  expect_status: 200
subscription_input: null
faults: []
assertions:
- key: traffic.before_jitter_should_succeed.success
  op: eq
  expected: true
- key: traffic.during_jitter_should_fail.success
  op: eq
  expected: false
- key: traffic.clear_jitter.detail.applied_delay_ms
  op: eq
  expected: 0
- key: traffic.after_clear_should_recover.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
