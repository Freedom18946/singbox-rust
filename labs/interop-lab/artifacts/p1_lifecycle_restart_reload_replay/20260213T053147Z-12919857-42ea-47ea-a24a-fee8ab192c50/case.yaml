id: p1_lifecycle_restart_reload_replay
title: lifecycle restart and reload replay on rust kernel
owner: null
priority: p1
kernel_mode: rust
tags:
- control-plane
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_socks_http.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19190
      secret: null
  go: null
gui_sequence:
- kind: http
  name: healthz_before
  method: GET
  path: /healthz
  body: null
  expect_status: 200
upstream_topology: []
traffic_plan:
- kind: http_get
  name: before_restart_healthz
  url: http://127.0.0.1:19190/healthz
  proxy: null
  expect_status: 200
- kind: kernel_control
  name: restart_kernel
  action: restart
  target: rust
  wait_ready_ms: 15000
- kind: http_get
  name: after_restart_healthz
  url: http://127.0.0.1:19190/healthz
  proxy: null
  expect_status: 200
- kind: kernel_control
  name: reload_kernel
  action: reload
  target: rust
  wait_ready_ms: 15000
- kind: http_get
  name: after_reload_healthz
  url: http://127.0.0.1:19190/healthz
  proxy: null
  expect_status: 200
subscription_input: null
faults: []
assertions:
- key: traffic.before_restart_healthz.success
  op: eq
  expected: true
- key: traffic.restart_kernel.success
  op: eq
  expected: true
- key: traffic.after_restart_healthz.success
  op: eq
  expected: true
- key: traffic.reload_kernel.success
  op: eq
  expected: true
- key: traffic.after_reload_healthz.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: false
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
