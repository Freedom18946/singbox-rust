id: p1_lifecycle_restart_reload_replay
title: lifecycle restart and reload replay on both kernels
owner: null
priority: p1
kernel_mode: both
tags:
- control-plane
- dual_core
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api.json
    - run
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
    - run
    - -c
    - labs/interop-lab/configs/go_core_clash_api.json
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence: []
upstream_topology: []
traffic_plan:
- kind: api_http
  name: version_before_restart
  method: GET
  path: /version
  body: null
  no_auth: false
  auth_secret: null
  expect_status: 200
- kind: kernel_control
  name: restart_rust_kernel
  action: restart
  target: rust
  wait_ready_ms: 15000
- kind: kernel_control
  name: restart_go_kernel
  action: restart
  target: go
  wait_ready_ms: 15000
- kind: api_http
  name: version_after_restart
  method: GET
  path: /version
  body: null
  no_auth: false
  auth_secret: null
  expect_status: 200
- kind: kernel_control
  name: reload_rust_kernel
  action: reload
  target: rust
  wait_ready_ms: 15000
- kind: kernel_control
  name: reload_go_kernel
  action: reload
  target: go
  wait_ready_ms: 15000
- kind: api_http
  name: version_after_reload
  method: GET
  path: /version
  body: null
  no_auth: false
  auth_secret: null
  expect_status: 200
subscription_input: null
faults: []
assertions:
- key: traffic.version_before_restart.success
  op: eq
  expected: true
- key: traffic.restart_rust_kernel.success
  op: eq
  expected: true
- key: traffic.restart_go_kernel.success
  op: eq
  expected: true
- key: traffic.version_after_restart.success
  op: eq
  expected: true
- key: traffic.reload_rust_kernel.success
  op: eq
  expected: true
- key: traffic.reload_go_kernel.success
  op: eq
  expected: true
- key: traffic.version_after_reload.success
  op: eq
  expected: true
- key: http.version_before_restart.status
  op: eq
  expected: 200
- key: http.version_after_restart.status
  op: eq
  expected: 200
- key: http.version_after_reload.status
  op: eq
  expected: 200
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths:
  - /version
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
