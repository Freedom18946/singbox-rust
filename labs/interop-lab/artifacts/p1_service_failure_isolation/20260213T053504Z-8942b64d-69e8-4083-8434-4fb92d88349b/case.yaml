id: p1_service_failure_isolation
title: broken service does not prevent core kernel startup
owner: L13
priority: p1
kernel_mode: rust
tags:
- service
- fault-isolation
- resilience
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_broken_service.json
    - run
    - --admin-listen
    - 127.0.0.1:19305
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /healthz
    api:
      base_url: http://127.0.0.1:19291
      secret: null
  go: null
gui_sequence:
- kind: http
  name: clash_api_should_be_reachable
  method: GET
  path: /
  body: null
  expect_status: 200
upstream_topology: []
traffic_plan: []
subscription_input: null
faults: []
assertions:
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
