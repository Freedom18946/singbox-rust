id: p2_trojan_network_restart_suite
title: trojan same-port restart recovery via real net_e2e test
priority: p2
kernel_mode: rust
bootstrap:
  rust:
    command: null
    args: []
    env: {}
    workdir: null
    startup_timeout_ms: 30000
    ready_path: /v1/echo
    api:
      base_url: '{{upstream.local_http}}'
      secret: null
  go: null
gui_sequence: []
upstream_topology:
- name: local_http
  kind: http_echo
  bind: 127.0.0.1:0
traffic_plan:
- kind: command
  name: trojan_network_restart_recovery
  command: cargo
  args:
  - test
  - -p
  - app
  - --test
  - trojan_network_fault_recovery
  - --features
  - net_e2e,tls_reality
  - --
  - --nocapture
  env: {}
  workdir: null
  timeout_ms: 600000
  expect_exit: 0
subscription_input: null
faults: []
assertions:
- key: traffic.trojan_network_restart_recovery.success
  op: eq
  expected: true
oracle:
  ignore_http_paths: []
  ignore_ws_paths: []
  tolerate_counter_jitter: true
