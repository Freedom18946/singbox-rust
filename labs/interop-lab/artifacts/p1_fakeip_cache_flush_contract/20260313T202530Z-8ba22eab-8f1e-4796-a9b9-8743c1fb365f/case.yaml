subscription_input: null
faults: []
assertions:
- key: traffic.flush_reset.success
  op: eq
  expected: true
- key: traffic.query_seed.detail.answer_ips.0
  op: regex
  expected: ^198\.(18|19)\.
- key: traffic.query_next.detail.answer_ips.0
  op: regex
  expected: ^198\.(18|19)\.
- key: traffic.query_after_reset.detail.answer_ips.0
  op: regex
  expected: ^198\.(18|19)\.
- key: traffic.query_ipv6_bucket.detail.answer_ips.0
  op: regex
  expected: ^fc
- key: traffic.query_seed.detail.answer_ips.0
  op: ne_ref
  expected: traffic.query_next.detail.answer_ips.0
- key: traffic.query_seed.detail.answer_ips.0
  op: eq_ref
  expected: traffic.query_after_reset.detail.answer_ips.0
- key: errors.count
  op: eq
  expected: 0
oracle:
  ignore_http_paths:
  - /dns/query*
  - /cache/fakeip/flush
  ignore_ws_paths: []
  tolerate_counter_jitter: true
  counter_jitter_abs: 0
post_traffic_gui_sequence: null
