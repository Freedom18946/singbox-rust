id: p1_fakeip_cache_flush_contract
title: fakeip cache flush resets allocation sequence on both kernels
owner: null
priority: p1
kernel_mode: both
tags:
- control-plane
- dataplane
- dual_core
- dns
- fakeip
env_class: strict
bootstrap:
  rust:
    command: ./target/debug/app
    args:
    - -c
    - labs/interop-lab/configs/rust_core_clash_api_fakeip_flush.json
    - run
    - --admin-listen
    - 127.0.0.1:19190
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:19290
      secret: test-secret
  go:
    command: go_fork_source/sing-box-1.12.14/sing-box
    args:
    - run
    - -c
    - labs/interop-lab/configs/go_core_clash_api_fakeip_flush.json
    env: {}
    workdir: null
    startup_timeout_ms: 15000
    ready_path: /version
    api:
      base_url: http://127.0.0.1:9090
      secret: test-secret
gui_sequence: []
upstream_topology: []
