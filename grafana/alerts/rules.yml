groups:
  - name: singbox_dns
    interval: 30s
    rules:
      - alert: HighDNSErrorRate
        expr: |
          (
            sum(rate(dns_failed_total[5m]))
            /
            clamp_min(sum(rate(dns_success_total[5m])) + sum(rate(dns_failed_total[5m])), 1e-9)
          ) > 0.05
          and
          (sum(rate(dns_success_total[5m])) + sum(rate(dns_failed_total[5m]))) > 1
        for: 2m
        labels:
          severity: warning
          component: dns
        annotations:
          summary: "High DNS failure rate"
          description: "DNS failure rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: DNSHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(dns_rtt_ms_bucket[5m])) by (le)) > 500
        for: 5m
        labels:
          severity: warning
          component: dns
        annotations:
          summary: "DNS P95 latency is high"
          description: "DNS P95 RTT is {{ $value | humanize }} ms."

      - alert: DNSCacheLowHitRate
        expr: |
          (
            sum(rate(dns_cache_hit_total[5m]))
            /
            clamp_min(sum(rate(dns_cache_hit_total[5m])) + sum(rate(dns_cache_miss_total[5m])), 1e-9)
          ) < 0.50
          and
          (sum(rate(dns_cache_hit_total[5m])) + sum(rate(dns_cache_miss_total[5m]))) > 1
        for: 10m
        labels:
          severity: info
          component: dns
        annotations:
          summary: "DNS cache hit rate is low"
          description: "DNS cache hit rate is {{ $value | humanizePercentage }} over the last 5 minutes."

  - name: singbox_http
    interval: 30s
    rules:
      - alert: HighHTTP5xxErrorRate
        expr: |
          (
            sum(rate(http_respond_total{code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_respond_total[5m])), 1e-9)
          ) > 0.05
          and
          sum(rate(http_respond_total[5m])) > 1
        for: 2m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High HTTP 5xx rate"
          description: "HTTP 5xx rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HTTPConnectLatencyHigh
        expr: |
          histogram_quantile(0.95, sum(rate(http_connect_duration_ms_bucket[5m])) by (le)) > 1000
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "HTTP connect latency is high"
          description: "HTTP connect P95 is {{ $value | humanize }} ms."

      - alert: HighHTTPClientErrorRate
        expr: |
          (
            sum(rate(http_respond_total{code=~"4.."}[5m]))
            /
            clamp_min(sum(rate(http_respond_total[5m])), 1e-9)
          ) > 0.30
          and
          sum(rate(http_respond_total[5m])) > 1
        for: 5m
        labels:
          severity: info
          component: http
        annotations:
          summary: "High HTTP 4xx rate"
          description: "HTTP 4xx rate is {{ $value | humanizePercentage }} over the last 5 minutes."

  - name: singbox_proxy
    interval: 30s
    rules:
      - alert: ProxyEndpointDown
        expr: |
          proxy_up == 0
        for: 1m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Proxy endpoint is down"
          description: "Proxy endpoint {{ $labels.endpoint }} ({{ $labels.kind }}) is reporting down."

      - alert: ProxyRTTHigh
        expr: |
          histogram_quantile(0.95, sum(rate(proxy_rtt_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Proxy RTT is high"
          description: "Proxy RTT P95 is {{ $value | humanizeDuration }}."

      - alert: CircuitBreakerOpeningFrequently
        expr: |
          sum(rate(proxy_circuit_state_total{state="open"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Circuit breaker is opening frequently"
          description: "Open-state transitions are occurring at {{ $value | humanize }}/s."

  - name: singbox_outbound
    interval: 30s
    rules:
      - alert: HighOutboundErrorRate
        expr: |
          (
            (sum(rate(outbound_connect_error_total[5m])) or on() vector(0))
            +
            (sum(rate(outbound_error_total[5m])) or on() vector(0))
          ) > 5
        for: 5m
        labels:
          severity: warning
          component: outbound
        annotations:
          summary: "Outbound errors are high"
          description: "Outbound error throughput is {{ $value | humanize }}/s."

      - alert: HighTCPConnectLatency
        expr: |
          histogram_quantile(0.95, sum(rate(tcp_connect_duration_seconds_bucket[5m])) by (le)) > 3
        for: 5m
        labels:
          severity: warning
          component: outbound
        annotations:
          summary: "TCP connect latency is high"
          description: "TCP connect P95 is {{ $value | humanizeDuration }}."

  - name: singbox_udp
    interval: 30s
    rules:
      - alert: UDPNATTableNearCapacity
        expr: |
          udp_nat_size > 8000
        for: 2m
        labels:
          severity: warning
          component: udp
        annotations:
          summary: "UDP NAT table is near capacity"
          description: "UDP NAT size is {{ $value }}."

      - alert: UDPNATTableFull
        expr: |
          udp_nat_size >= 9500
        for: 30s
        labels:
          severity: critical
          component: udp
        annotations:
          summary: "UDP NAT table is full"
          description: "UDP NAT size is {{ $value }}."

      - alert: HighUDPFailureRate
        expr: |
          sum(rate(udp_upstream_fail_total[5m])) > 10
        for: 3m
        labels:
          severity: warning
          component: udp
        annotations:
          summary: "UDP failure rate is high"
          description: "UDP upstream failures are {{ $value | humanize }}/s."

      - alert: HighUDPEvictionRate
        expr: |
          sum(rate(udp_nat_evicted_total{reason="capacity"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: udp
        annotations:
          summary: "UDP NAT evictions are high"
          description: "Capacity evictions are {{ $value | humanize }}/s."

  - name: singbox_metrics
    interval: 30s
    rules:
      - alert: PrometheusExportFailed
        expr: |
          sum(increase(prom_http_fail_total[5m])) > 5
        for: 2m
        labels:
          severity: warning
          component: metrics
        annotations:
          summary: "Prometheus export is failing"
          description: "Metrics export has failed {{ $value | humanize }} times in the last 5 minutes."
