# Cargo configuration for singbox-rust
# This file provides workspace-wide build settings and compiler flags

[alias]
xtask = "run --package xtask --"

[build]
rustflags = [
  # Required by reqwest's http3 compile gate (only effective when reqwest/http3 is enabled).
  # This cfg is a no-op for all other crates. Cannot be scoped via build.rs because
  # it must be set when compiling reqwest itself, not just the downstream crate.
  "--cfg", "reqwest_unstable",
]

# Documentation build settings
[doc]
rustdocflags = ["-D", "warnings"]

# Target-specific configurations
# Note: Rust 1.92+ uses lld by default on x86_64-unknown-linux-gnu
# For macOS, we manually enable rust-lld for faster linking

# macOS Apple Silicon - Use rust-lld for 30-50% faster linking
# rust-lld is bundled with Rust toolchain, no extra installation needed
[target.aarch64-apple-darwin]
# Fast-link by default. If a specific bin hits linker issues, fallback:
# CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=cc
linker = "rust-lld"
