apiVersion: v1
kind: Service
metadata:
  name: {{ include "singbox-rust.fullname" . }}
  labels:
    {{- include "singbox-rust.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "singbox-rust.selectorLabels" . | nindent 4 }}
  ports:
    {{- range .Values.service.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol }}
    {{- end }}
