replicaCount: 1

image:
  repository: ghcr.io/freedom18946/singbox-rust
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  ports:
    - name: socks
      port: 1080
      targetPort: 1080
      protocol: TCP
    - name: admin
      port: 19090
      targetPort: 19090
      protocol: TCP

env:
  RUST_LOG: info
  ADMIN_LISTEN: 0.0.0.0:19090

config:
  config.json: |
    {
      "schema_version": 2,
      "log": {
        "level": "info"
      },
      "inbounds": [
        {
          "type": "mixed",
          "name": "mixed-in",
          "listen": "0.0.0.0:1080"
        }
      ],
      "outbounds": [
        {
          "type": "direct",
          "name": "direct"
        }
      ],
      "route": {
        "default": "direct"
      }
    }

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "1000m"

livenessProbe:
  httpGet:
    path: /healthz
    port: admin

readinessProbe:
  httpGet:
    path: /healthz
    port: admin

nodeSelector: {}
tolerations: []
affinity: {}
