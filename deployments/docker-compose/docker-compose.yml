services:
  singbox-rust:
    image: ${SINGBOX_IMAGE:-ghcr.io/freedom18946/singbox-rust:latest}
    container_name: singbox-rust
    restart: unless-stopped
    command: ["app", "run", "-c", "/etc/singbox/config.json"]
    ports:
      - "1080:1080/tcp"
    volumes:
      - ../config-template.json:/etc/singbox/config.json:ro
    environment:
      RUST_LOG: info
      ADMIN_LISTEN: 0.0.0.0:19090
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "3", "-O", "/dev/null", "http://127.0.0.1:19090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: singbox-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      - singbox-rust

volumes:
  prometheus-data:
