apiVersion: apps/v1
kind: Deployment
metadata:
  name: singbox-rust
  labels:
    app: singbox-rust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: singbox-rust
  template:
    metadata:
      labels:
        app: singbox-rust
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: singbox-rust
          image: ghcr.io/freedom18946/singbox-rust:latest
          imagePullPolicy: IfNotPresent
          command: ["app", "run", "-c", "/etc/singbox/config.json"]
          env:
            - name: RUST_LOG
              value: info
            - name: ADMIN_LISTEN
              value: 0.0.0.0:19090
          ports:
            - name: socks
              containerPort: 1080
              protocol: TCP
            - name: admin
              containerPort: 19090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/singbox/config.json
              subPath: config.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
          readinessProbe:
            httpGet:
              path: /healthz
              port: admin
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: singbox-rust-config
---
apiVersion: v1
kind: Service
metadata:
  name: singbox-rust
  labels:
    app: singbox-rust
spec:
  type: ClusterIP
  selector:
    app: singbox-rust
  ports:
    - name: socks
      port: 1080
      targetPort: socks
      protocol: TCP
    - name: admin
      port: 19090
      targetPort: admin
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: singbox-rust-config
data:
  config.json: |
    {
      "schema_version": 2,
      "log": {
        "level": "info"
      },
      "inbounds": [
        {
          "type": "mixed",
          "name": "mixed-in",
          "listen": "0.0.0.0:1080"
        }
      ],
      "outbounds": [
        {
          "type": "direct",
          "name": "direct"
        }
      ],
      "route": {
        "default": "direct"
      }
    }
