services:
  singbox-rust:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        BUILD_FEATURES: "parity"
    container_name: singbox-rust
    restart: unless-stopped
    command: ["app", "run", "-c", "/etc/singbox/config.json"]
    ports:
      - "1080:1080"
    volumes:
      - ./config:/etc/singbox:ro
      - singbox-data:/var/lib/singbox
    environment:
      RUST_LOG: info
      ADMIN_LISTEN: 0.0.0.0:19090
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "3", "-O", "/dev/null", "http://127.0.0.1:19090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  singbox-data:
