inbounds:
  - type: http
    listen: "127.0.0.1"
    port: 8080

outbounds:
  - type: direct
    name: direct

# Test reference file validation (only one rules file)
rules_text: "tests/data/test_rules.txt"

# Additional fields with *file/*path suffixes
custom_config_file: "tests/configs/test_custom.conf"
ssl_cert_path: "tests/configs/test_cert.pem"
