[package]
name = "tun2socks-shim"
version = "0.1.10"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Switchable tun2socks shim (stub by default, real via feature)."

[lib]
name = "tun2socks"
path = "src/lib.rs"

[features]
default = []
stub = []
real = ["dep:tun2socks_real"]

[target.'cfg(target_os = "macos")'.dependencies]
tun2socks_real = { package = "tun2socks", version = "0.1.10", optional = true }
