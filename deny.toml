# cargo-deny configuration
# Run: cargo deny check

[advisories]
version = 2
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"          # No yanked crates allowed
notice = "warn"
ignore = [
  # Unmaintained - no upgrade available, tracking for future replacement
  "RUSTSEC-2025-0119",  # number_prefix unmaintained (via indicatif)
  "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (migrate to rustls-pki-types PemObject)
  "RUSTSEC-2025-0057",  # fxhash unmaintained (via sled)
  "RUSTSEC-2024-0384",  # instant unmaintained (via sled->parking_lot 0.11)
]

[licenses]
version = 2
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "WTFPL",
]
copyleft = "warn"
confidence-threshold = 0.8
# Workspace crates without explicit license - allow them
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
