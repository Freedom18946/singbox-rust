# cargo-deny configuration (compatible with cargo-deny 0.18.x)
# Primary commands:
#   cargo deny check licenses
#   cargo deny check advisories

[graph]
all-features = true
no-default-features = false

[advisories]
# L17 policy: block HIGH/CRITICAL in cargo-audit gate; keep known unmaintained as tracked warnings.
ignore = [
  # Existing tracked unmaintained advisories in current dependency tree.
  "RUSTSEC-2025-0119", # number_prefix unmaintained (via indicatif)
  "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
  "RUSTSEC-2025-0057", # fxhash unmaintained (via sled)
  "RUSTSEC-2024-0384", # instant unmaintained (via sled->parking_lot 0.11)
  "RUSTSEC-2024-0388", # derivative unmaintained
  "RUSTSEC-2024-0436", # paste unmaintained
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  # "Unicode-DFS-2016", # removed: not present in current dependency tree
  "Unlicense",
  "MIT-0",
  "Zlib",
  "BSL-1.0",
  "OpenSSL",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "0BSD",
  "WTFPL",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "bounded-vec-deque"
expression = "BSD-3-Clause"
license-files = [{ path = "LICENSE-BSD", hash = 0xDD41CE09 }]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
