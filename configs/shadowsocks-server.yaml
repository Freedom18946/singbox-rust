# Shadowsocks Server Configuration Template
# Production-ready configuration for deployment
#
# Usage: singbox-rust run -c configs/shadowsocks-server.yaml
# Note: the current strict `check` validator still rejects Shadowsocks inbound
# `method`/`password` fields even though the runtime adapter accepts them.

log:
  level: info
  output: /var/log/singbox-rust/singbox.log
  timestamp: true

inbounds:
  - type: shadowsocks
    tag: ss-in
    listen: 0.0.0.0
    listen_port: 8388

    # Cipher method: aes-128-gcm, aes-256-gcm, chacha20-ietf-poly1305
    # Recommendation: chacha20-ietf-poly1305 for mobile/ARM (better software perf)
    #                 aes-256-gcm for servers with AES-NI hardware support
    method: aes-256-gcm

    # SECURITY: Change this to a strong password (>= 20 characters)
    password: CHANGEME_USE_STRONG_PASSWORD_HERE

    # Multi-user support is not yet normalized in schema-v2 validation.
    # Keep this template in the legacy-compatible shape until the validator
    # accepts Shadowsocks inbound method/password fields in V2.

outbounds:
  - type: direct
    tag: direct
  - type: block
    tag: block

route:
  default: direct
