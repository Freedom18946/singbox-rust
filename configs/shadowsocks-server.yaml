# Shadowsocks server configuration template.
# Example only: replace password and paths before deployment.
#
# Usage: app run -c configs/shadowsocks-server.yaml

schema_version: 2
log:
  level: info
  output: /var/log/singbox-rust/singbox.log
  timestamp: true

inbounds:
  - type: shadowsocks
    name: ss-in
    listen: "0.0.0.0:8388"

    # Cipher method: aes-128-gcm, aes-256-gcm, chacha20-ietf-poly1305
    # Recommendation: chacha20-ietf-poly1305 for mobile/ARM (better software perf)
    #                 aes-256-gcm for servers with AES-NI hardware support
    method: aes-256-gcm

    # SECURITY: Change this to a strong password (>= 20 characters)
    password: CHANGEME_USE_STRONG_PASSWORD_HERE

outbounds:
  - type: direct
    name: direct
  - type: block
    name: block

route:
  default: direct
